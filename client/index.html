<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Four Leaf Resort | Luxury & Nature</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@100;300;400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              vp: {
                dark: '#0f172a',
                blue: '#1e293b',
                gold: '#d4af37',
                cream: '#f8fafc',
              },
              admin: {
                bg: '#0b1121',
                card: '#111a2e',
                surface: '#162033',
                border: '#1e2d4a',
                hover: '#1a2742',
                text: '#94a3b8',
                heading: '#e2e8f0',
              }
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Lato"', 'sans-serif'],
            },
            animation: {
              'admin-fadeIn': 'adminFadeIn 0.4s ease-out forwards',
              'admin-slideIn': 'adminSlideIn 0.3s ease-out forwards',
              'admin-scaleIn': 'adminScaleIn 0.3s ease-out forwards',
              'shimmer': 'shimmer 1.5s infinite linear',
              'admin-slideDown': 'adminSlideDown 0.3s ease-out forwards',
            },
            keyframes: {
              adminFadeIn: {
                '0%': { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              adminSlideIn: {
                '0%': { opacity: '0', transform: 'translateX(-16px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              adminScaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              adminSlideDown: {
                '0%': { opacity: '0', transform: 'translateY(-8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            },
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar - Public */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Admin Dark Scrollbar */
      .admin-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .admin-scroll::-webkit-scrollbar-track {
        background: #0b1121;
      }
      .admin-scroll::-webkit-scrollbar-thumb {
        background: #1e2d4a;
        border-radius: 3px;
      }
      .admin-scroll::-webkit-scrollbar-thumb:hover {
        background: #2a3f5f;
      }
      /* Admin skeleton loader */
      .skeleton-pulse {
        background: linear-gradient(90deg, #162033 25%, #1e2d4a 50%, #162033 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite linear;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "express": "https://aistudiocdn.com/express@^5.1.0",
    "mongoose": "https://aistudiocdn.com/mongoose@^9.0.0",
    "bcryptjs": "https://aistudiocdn.com/bcryptjs@^3.0.3",
    "cors": "https://aistudiocdn.com/cors@^2.8.5",
    "crypto": "https://aistudiocdn.com/crypto@^1.0.1",
    "jsonwebtoken": "https://aistudiocdn.com/jsonwebtoken@^9.0.2",
    "dotenv": "https://aistudiocdn.com/dotenv@^17.2.3",
    "express-async-handler": "https://aistudiocdn.com/express-async-handler@^1.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-vp-cream text-slate-800 font-sans antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
